# =====================================================
# Prescriptions Data Builder - dbt Project Configuration
# =====================================================
# Project: Pharmacy Management System Data Analytics
# Purpose: Transform raw PMS data into analytics-ready dimensions and facts
# Owner: Analytics Team
# Last Updated: 2026-03-29

name: 'prescriptions_data_builder'
version: '1.0.0'
config-version: 2

# dbt Version Requirements
require-dbt-version: [">=1.5.0", "<2.0.0"]

# Profile Configuration
profile: 'prescriptions_data_builder'

# =====================================================
# Directory Paths Configuration
# =====================================================
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"


# =====================================================
# Models Configuration
# =====================================================
# Configures materialization and database/schema targets for model layers
# Can be overridden at individual model level using {{ config(...) }} macro

models:
  prescriptions_data_builder:
    staging:
      +description: "Staging layer - cleaned and standardized raw data"
      +database: analytics
      +schema: staging
      +materialized: view
      +tags: [staging]
    
    dimensions:
      +description: "Dimension tables for analytics - slowly changing dimensions (SCD Type 2)"
      +database: analytics
      +schema: dimensions
      +materialized: table
      +tags: [dimensions]
      +indexes:
        - columns: [user_id, medication_id]
    
    fact:
      +description: "Fact tables for analytics - prescription transactions"
      +database: analytics
      +schema: fact
      +materialized: table
      +tags: [facts]
      +indexes:
        - columns: [prescription_id, user_id, medication_id]
