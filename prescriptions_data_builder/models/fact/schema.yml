models:
  - name: fct_prescriptions
    columns:
      - name: fact_sk
        tests:
          - not_null
          - unique
      - name: user_sk
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_users')
                field: user_sk
      - name: medication_sk
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_medications')
                field: medication_sk
  - name: dim_users
    columns:
      - name: user_sk
        tests:
          - not_null
          - unique