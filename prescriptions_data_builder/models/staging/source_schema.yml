sources:
  - name: source_data
    description: Raw data coming from PMS (pharmacy management system)
    database: pharmacy_db  
    schema: public
    tables:
      - name: users
      - name: prescriptions
      - name: medications
models:
  - name: stg_prescriptions_orders  
    columns:
      - name: total_amount
        tests:
          - not_null
          - positive_amount
      - name: user_id
        tests:
          - not_null
      - name: medication_id
        tests:
          - not_null
  
