snapshots:
  - name: users_snapshot
    relation: source('source_data', 'users')
    config:
      database: analytics
      schema: snapshots
      strategy: check
      unique_key: user_id
      check_cols: ['name', 'email', 'phone', 'address']
      dbt_valid_to_current: "to_date('9999-12-31')"
      hard_deletes: ignore